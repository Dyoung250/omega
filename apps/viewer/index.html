<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FORGIA Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0b; color: #e5e5e5; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
    #canvas-container { width: 100vw; height: 100vh; }
    #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0a0a0b; z-index: 100; transition: opacity 0.3s; }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 40px; height: 40px; border: 3px solid #2e2e34; border-top-color: #d4a373; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: #0a0a0b; z-index: 101; flex-direction: column; gap: 1rem; }
    #error.visible { display: flex; }
    .forgia-logo { font-size: 1.5rem; font-weight: 700; color: #d4a373; letter-spacing: 0.05em; }
    .forgia-sub { font-size: 0.75rem; color: #666; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
  </div>
  <div id="error">
    <div class="forgia-logo">FORGIA <span style="font-weight:300">Ω</span></div>
    <div class="forgia-sub" id="error-msg">Preview not found</div>
  </div>
  <div id="canvas-container"></div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.8';

    // Replace these with your Supabase project credentials
    const SUPABASE_URL = 'https://your-project.supabase.co';
    const SUPABASE_ANON_KEY = 'your-anon-key';

    const params = new URLSearchParams(location.search);
    const uuid = params.get('id') || location.pathname.split('/').pop();

    if (!uuid || uuid === 'index.html') {
      showError('No preview ID provided');
      throw new Error('No preview ID');
    }

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadPreview() {
      const { data, error } = await supabase
        .from('project_previews')
        .select('*')
        .eq('id', uuid)
        .single();

      if (error || !data) {
        showError('Preview not found or expired');
        return;
      }

      renderScene(data.scene_data);
      document.getElementById('loading').classList.add('hidden');
    }

    function showError(msg) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('visible');
      document.getElementById('error-msg').textContent = msg;
    }

    function renderScene(sceneData) {
      const container = document.getElementById('canvas-container');
      const scene = new THREE.Scene();
      scene.background = new THREE.Color('#0a0a0b');
      scene.fog = new THREE.Fog('#0a0a0b', 10, 50);

      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(3, 3, 3);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      container.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 0, 0);

      scene.add(new THREE.AmbientLight(0xffffff, 0.3));
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
      dirLight.position.set(5, 10, 5);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.width = 2048;
      dirLight.shadow.mapSize.height = 2048;
      scene.add(dirLight);

      // Grid
      const grid = new THREE.GridHelper(20, 40, 0x3a3a42, 0x2e2e34);
      scene.add(grid);

      // Build objects from scene_data
      const objects = sceneData.objects || [];
      for (const obj of objects) {
        const mesh = buildMesh(obj);
        if (mesh) scene.add(mesh);
      }

      // Camera from scene_data if present
      if (sceneData.camera) {
        const c = sceneData.camera;
        camera.position.set(c.position[0], c.position[1], c.position[2]);
        controls.target.set(c.target[0], c.target[1], c.target[2]);
      }

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();
    }

    function buildMesh(obj) {
      let geometry;
      const defId = obj.defId || obj.type;
      const p = obj.params || {};

      switch (defId) {
        case 'beam_rect':
          geometry = new THREE.BoxGeometry(p.l/100 || 1, p.h/100 || 0.1, p.w/100 || 0.1);
          break;
        case 'beam_t':
          geometry = new THREE.BoxGeometry(p.l/100 || 1, p.h/100 || 0.2, p.fl/100 || 0.15);
          break;
        case 'beam_i':
          geometry = new THREE.BoxGeometry(p.l/100 || 1, p.h/100 || 0.2, p.fl/100 || 0.15);
          break;
        case 'beam_l':
          geometry = new THREE.BoxGeometry(p.l/100 || 1, p.h/100 || 0.1, p.w/100 || 0.1);
          break;
        case 'beam_u':
          geometry = new THREE.BoxGeometry(p.l/100 || 1, p.h/100 || 0.15, p.fl/100 || 0.12);
          break;
        case 'beam_hollow':
          geometry = new THREE.BoxGeometry(p.l/100 || 1, p.h/100 || 0.2, p.w/100 || 0.2);
          break;
        case 'beam_round':
          geometry = new THREE.CylinderGeometry(p.d/200 || 0.05, p.d/200 || 0.05, p.l/100 || 1, 32);
          break;
        case 'plate':
          geometry = new THREE.BoxGeometry(p.l/100 || 1, p.s/100 || 0.01, p.w/100 || 1);
          break;
        case 'column':
          geometry = new THREE.BoxGeometry(p.sx/100 || 0.2, p.h/100 || 3, p.sz/100 || 0.2);
          break;
        case 'column_round':
          geometry = new THREE.CylinderGeometry(p.d/200 || 0.1, p.d/200 || 0.1, p.h/100 || 3, 32);
          break;
        case 'column_tube':
          geometry = new THREE.CylinderGeometry(p.d/200 || 0.1, p.d/200 || 0.1, p.h/100 || 3, 32);
          break;
        case 'bracing_x':
          geometry = new THREE.BoxGeometry(p.l/100 || 2, p.s/100 || 0.05, p.s/100 || 0.05);
          break;
        case 'bracing_v':
          geometry = new THREE.BoxGeometry(p.l/100 || 2, p.s/100 || 0.05, p.s/100 || 0.05);
          break;
        case 'bracing_k':
          geometry = new THREE.BoxGeometry(p.l/100 || 2, p.s/100 || 0.05, p.s/100 || 0.05);
          break;
        case 'bracing_h':
          geometry = new THREE.BoxGeometry(p.l/100 || 2, p.s/100 || 0.05, p.s/100 || 0.05);
          break;
        case 'cantilever':
          geometry = new THREE.BoxGeometry(p.l/100 || 1, p.h/100 || 0.15, p.w/100 || 0.1);
          break;
        case 'rigid_joint':
          geometry = new THREE.BoxGeometry(p.l/100 || 0.3, p.h/100 || 0.3, p.w/100 || 0.3);
          break;
        case 'connection_plate':
          geometry = new THREE.BoxGeometry(p.l/100 || 0.2, p.s/100 || 0.01, p.w/100 || 0.2);
          break;
        case 'anchor_bolt':
          geometry = new THREE.CylinderGeometry(p.d/200 || 0.01, p.d/200 || 0.01, p.l/100 || 0.1, 16);
          break;
        case 'beam_c':
          geometry = new THREE.BoxGeometry(p.l/100 || 1, p.h/100 || 0.15, p.fl/100 || 0.1);
          break;
        case 'beam_z':
          geometry = new THREE.BoxGeometry(p.l/100 || 1, p.h/100 || 0.15, p.fl/100 || 0.1);
          break;
        case 'tube_square':
          geometry = new THREE.BoxGeometry(p.l/100 || 1, p.s/100 || 0.1, p.s/100 || 0.1);
          break;
        case 'tube_rect':
          geometry = new THREE.BoxGeometry(p.l/100 || 1, p.h/100 || 0.1, p.w/100 || 0.08);
          break;
        default:
          geometry = new THREE.BoxGeometry(1, 0.1, 0.1);
      }

      const material = new THREE.MeshStandardMaterial({
        color: obj.color || '#d4a373',
        roughness: 0.6,
        metalness: 0.3,
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = true;
      mesh.receiveShadow = true;

      const pos = obj.position || [0, 0, 0];
      const rot = obj.rotation || [0, 0, 0];
      const scl = obj.scale || [1, 1, 1];

      mesh.position.set(pos[0], pos[1], pos[2]);
      mesh.rotation.set(rot[0], rot[1], rot[2]);
      mesh.scale.set(scl[0], scl[1], scl[2]);

      return mesh;
    }

    loadPreview();
  </script>
</body>
</html>
